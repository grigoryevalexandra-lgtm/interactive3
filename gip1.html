<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный чат-обучение для ГИП</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff3eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Times New Roman, Arial, sans-serif;
            color: #1a1a1a;
            display: block;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            max-width: 600px;
            margin: 30px auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            height: 80vh;
            min-height: 550px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Шапка чата */
        .chat-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #f0e6df;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #111;
        }

        .chat-header-info p {
            font-size: 13px;
            color: #757575;
        }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafaf9;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #e0d5ce;
            border-radius: 4px;
        }

        /* Элементы сообщений */
        .message-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: messageAppear 0.4s ease-out forwards;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.teacher {
            align-self: flex-start;
        }

        /* Ученик отзеркален (аватарка справа) */
        .message-row.student {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 85%;
        }

        /* Контейнер для аватара-заглушки (на основе предоставленного изображения) */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Убираем фон, так как SVG содержит синий круг */
        }

        /* Базовая стилизация баблов сообщений */
        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .teacher .message-bubble {
            background: #ffffff;
            color: #1a1a1a;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        .student .message-bubble {
            background: #2b7de9;
            color: #ffffff;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.2);
        }

        .message-bubble p {
            margin-bottom: 8px;
        }
        .message-bubble p:last-child {
            margin-bottom: 0;
        }
        .message-bubble ul {
            margin-left: 18px;
            margin-bottom: 10px;
        }
        .message-bubble ul:last-child {
            margin-bottom: 0;
        }
        .message-bubble li {
            margin-bottom: 6px;
        }

        /* Предупреждение с лампочкой */
        .warning-card {
            background: #fff9db;
            border-left: 4px solid #fcc419;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            gap: 12px;
            color: #2b2b2b;
            font-size: 14px;
            line-height: 1.4;
        }

        .warning-card .bulb {
            font-size: 20px;
            line-height: 1;
        }

        /* Тест */
        .quiz-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .quiz-btn {
            background: #f1f3f5;
            border: 1px solid #e9ecef;
            padding: 12px 16px;
            border-radius: 10px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
            font-family: inherit;
        }

        .quiz-btn:hover:not(:disabled) {
            background: #e8ecef;
            border-color: #ced4da;
        }

        .quiz-btn.correct {
            background: #d3f9d8;
            border-color: #b2f2bb;
            color: #2b8a3e;
            font-weight: 500;
        }

        .quiz-btn.wrong {
            background: #ffe3e3;
            border-color: #ffa8a8;
            color: #c92a2a;
            opacity: 0.8;
        }

        /* Нижняя панель ввода */
        .chat-input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #f0e6df;
            position: relative;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
        }

        .chat-input-wrapper.active-input {
            background: #ffffff;
            border-color: #2b7de9;
            box-shadow: 0 0 0 3px rgba(43, 125, 233, 0.15);
        }

        .fake-input {
            flex: 1;
            font-size: 15px;
            color: #a0aec0;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .fake-input.filled {
            color: #1a202c;
        }

        .send-button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #cbd5e1;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: not-allowed;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-button.active {
            background: #2b7de9;
            cursor: pointer;
        }

        .send-button.pulse {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(43, 125, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0); }
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            fill: white;
            transform: translateX(1px);
        }

        .tooltip-hint {
            position: absolute;
            top: -38px;
            right: 26px;
            background: #334155;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: none;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tooltip-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-hint::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 16px;
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #334155 transparent;
        }

        /* Анимация печатания */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            align-items: center;
            justify-content: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #a0aec0;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar" id="headerAvatar">
                </div>
            <div class="chat-header-info">
                <h3>Главный инженер ИИваныч</h3>
                <p>В сети</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <div class="tooltip-hint" id="tooltipHint">Нажмите отправить, чтобы продолжить дальше</div>
            <div class="chat-input-wrapper" id="inputWrapper">
                <div class="fake-input" id="inputField">Напишите сообщение...</div>
                <button class="send-button" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // УНИВЕРСАЛЬНЫЙ АВАТАР-ЗАГЛУШКА (SVG)
    // Отрисован на основе предоставленного изображения image_1.png
    // ==========================================
    const defaultAvatarSVG = `
        <svg viewBox="0 0 100 100" width="40" height="40">
            <circle cx="50" cy="50" r="50" fill="#2b7de9"/>
            <path d="M50,18c8.8,0,16,7.2,16,16c0,8.8-7.2,16-16,16c-8.8,0-16-7.2-16-16C34,25.2,41.2,18,50,18z M72.8,70.5
            C71.3,66,68.7,62.1,65.1,59C60.7,55.3,55.3,53.5,50,53.5s-10.7,1.8-15.1,5.5c-3.6,3.1-6.2,7-7.7,11.5
            c-1.3,4.1-1.2,8.6,0.3,12.7c1.3,3.5,3.9,6.3,7.2,8c3.2,1.6,6.9,2.4,10.6,2.4H50c3.7,0,7.4-0.8,10.6-2.4
            c3.3-1.7,5.9-4.5,7.2-8C73.9,79.1,74,74.6,72.8,70.5z" fill="white"/>
        </svg>
    `;

    // Устанавливаем аватар в шапку чата при загрузке
    document.getElementById('headerAvatar').innerHTML = defaultAvatarSVG;

    const chatMessages = document.getElementById('chatMessages');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const tooltipHint = document.getElementById('tooltipHint');

    let currentState = 0;

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Индикатор печатания
    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-row teacher';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble" style="padding: 10px 14px;">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        chatMessages.appendChild(indicator);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    // Вывод сообщений
    function appendMessage(sender, contentHTML) {
        const msgRow = document.createElement('div');
        msgRow.className = `message-row ${sender}`;
        
        // Используем один и тот же defaultAvatarSVG для обоих отправителей
        if (sender === 'teacher') {
            msgRow.innerHTML = `
                <div class="avatar">${defaultAvatarSVG}</div>
                <div class="message-bubble">${contentHTML}</div>
            `;
        } else {
            // Для ученика бабл уже отзеркален CSS классом message-row.student
            msgRow.innerHTML = `
                <div class="avatar">${defaultAvatarSVG}</div>
                <div class="message-bubble">${contentHTML}</div>
            `;
        }
        
        chatMessages.appendChild(msgRow);
        scrollToBottom();
    }

    function prepareNextStudentAction(text) {
        inputField.innerText = text;
        inputField.classList.add('filled');
        inputWrapper.classList.add('active-input');
        sendBtn.removeAttribute('disabled');
        sendBtn.classList.add('active', 'pulse');
        tooltipHint.classList.add('show');
    }

    function resetInputArea() {
        inputField.innerText = "Напишите сообщение...";
        inputField.classList.remove('filled');
        inputWrapper.classList.remove('active-input');
        sendBtn.setAttribute('disabled', 'true');
        sendBtn.classList.remove('active', 'pulse');
        tooltipHint.classList.remove('show');
    }

    // Сценарий обучения
    function runDialogueStep() {
        if (currentState === 0) {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p>Вы все еще тонете в таблицах и административной работе? Представьте цифрового напарника, который не путает марки бетона и не просит отпуск. Давайте разберем, какие задачи ГИП может поручить нейросети.</p>`);
                
                currentState = 1;
                setTimeout(() => {
                    prepareNextStudentAction("Давайте!");
                }, 800);
            }, 1500);
        } 
        else if (currentState === 1) {
            resetInputArea();
            appendMessage('student', 'Давайте!');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const mainContent = `
                    <p><strong>Искусственный интеллект (ИИ) поможет:</strong></p>
                    <ul>
                        <li>Структурировать информацию. Например, заметки в отчеты</li>
                        <li>Генерировать черновики писем и протоколов</li>
                        <li>Извлекать информацию из документов</li>
                        <li>Сравнивать характеристики материалов</li>
                        <li>Сравнивать версии документов</li>
                        <li>Формулировать чек-листы, перечни, вопросы заказчику и подрядчику</li>
                    </ul>
                    <p><strong>ИИ поможет, но потребует особой проверки:</strong></p>
                    <ul>
                        <li>Замена нормоконтроля</li>
                        <li>Работа с конфиденциальными данными в публичных сервисах</li>
                        <li>Принятие технических решений – выбор схем и оборудование</li>
                        <li>Проведение расчетов, особенно из неполных данных</li>
                    </ul>
                    <div class="warning-card">
                        <div class="bulb">💡</div>
                        <div><strong>Важно:</strong> ИИ готовит черновик &rarr; вы проверяете &rarr; вы утверждаете. ИИ сокращает время работы, но не заменяет вас.</div>
                    </div>
                `;
                appendMessage('teacher', mainContent);
                
                currentState = 2;
                setTimeout(() => {
                    prepareNextStudentAction("Понятно");
                }, 1500);
            }, 2500);
        }
        else if (currentState === 2) {
            resetInputArea();
            appendMessage('student', 'Понятно');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const quizContent = `
                    <p><strong>Давайте закрепим материал: Какую задачу можно безопасно делегировать ИИ в самом начале?</strong></p>
                    <div class="quiz-container">
                        <button class="quiz-btn" onclick="checkAnswer(this, 'A')">А. Подготовить гидравлику для экспертизы</button>
                        <button class="quiz-btn" onclick="checkAnswer(this, 'B')">Б. Рассчитать нагрузки по СП</button>
                        <button class="quiz-btn" onclick="checkAnswer(this, 'C')">В. Подготовить черновик протокола совещания из заметок</button>
                    </div>
                `;
                appendMessage('teacher', quizContent);
                currentState = 3;
            }, 1500);
        }
    }

    function checkAnswer(button, option) {
        const buttons = button.parentNode.querySelectorAll('.quiz-btn');
        
        if (option === 'C') {
            buttons.forEach(btn => btn.setAttribute('disabled', 'true'));
            button.classList.add('correct');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<strong> Верно! Черновики отлично подходят для делегирования!:)`);
            }, 1500);
        } else {
            button.classList.add('wrong');
            button.setAttribute('disabled', 'true');
            
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `Неверно. Инженерные расчеты и критически важные данные для экспертизы требуют высокой точности, ИИ может наделать ошибок («галлюцинаций»). Попробуйте еще раз :)`);
            }, 1000);
        }
    }

    sendBtn.addEventListener('click', () => {
        if (!sendBtn.hasAttribute('disabled')) {
            runDialogueStep();
        }
    });

    // Автоматический старт диалога при загрузке
    window.addEventListener('DOMContentLoaded', () => {
        runDialogueStep();
    });
</script>

</body>
</html>
