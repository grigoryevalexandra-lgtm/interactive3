<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный чат-обучение для ГИП: Автоматизация встреч</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff3eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Times New Roman, Arial, sans-serif;
            color: #1a1a1a;
            display: block;
            min-height: 100vh;
            padding: 20px;
        }

        /* Оптимальная ширина чата для iframe-вставок */
        .chat-container {
            max-width: 760px;
            width: 100%;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            height: 85vh;
            min-height: 600px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Шапка чата */
        .chat-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #f0e6df;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #111;
        }

        .chat-header-info p {
            font-size: 13px;
            color: #757575;
        }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafaf9;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #e0d5ce;
            border-radius: 4px;
        }

        /* Элементы сообщений */
        .message-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: messageAppear 0.4s ease-out forwards;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.teacher {
            align-self: flex-start;
        }

        .message-row.student {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 85%;
        }

        /* Контейнер для аватара-заглушки в стиле WhatsApp */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Базовая стилизация баблов сообщений */
        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .teacher .message-bubble {
            background: #ffffff;
            color: #1a1a1a;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        .student .message-bubble {
            background: #2b7de9;
            color: #ffffff;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.2);
        }

        .message-bubble p {
            margin-bottom: 8px;
        }
        .message-bubble p:last-child {
            margin-bottom: 0;
        }
        .message-bubble ul, .message-bubble ol {
            margin-left: 18px;
            margin-bottom: 10px;
        }
        .message-bubble ul:last-child, .message-bubble ol:last-child {
            margin-bottom: 0;
        }
        .message-bubble li {
            margin-bottom: 6px;
        }

        /* Стилизация выделенного блока с промптом */
        .prompt-example-card {
            font-size: 14px; 
            background: #f8fafc; 
            padding: 12px 14px; 
            border-radius: 10px; 
            border: 1px solid #e2e8f0; 
            color: #334155;
            margin: 10px 0;
            font-style: italic;
        }

        /* Тест / Квиз */
        .quiz-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .quiz-btn {
            background: #f1f3f5;
            border: 1px solid #e9ecef;
            padding: 14px;
            border-radius: 12px;
            text-align: left;
            font-size: 14px;
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
            font-family: inherit;
        }

        .quiz-btn:hover:not(:disabled) {
            background: #e8ecef;
            border-color: #ced4da;
        }

        .quiz-btn strong {
            display: block;
            margin-bottom: 4px;
            font-size: 15px;
            color: #111;
        }

        /* Подсветка результатов квиза зеленым и красным */
        .quiz-btn.correct {
            background: #d3f9d8 !important;
            border-color: #b2f2bb !important;
            color: #2b8a3e !important;
        }
        .quiz-btn.correct strong { color: #2b8a3e !important; }

        .quiz-btn.wrong {
            background: #ffe3e3 !important;
            border-color: #ffa8a8 !important;
            color: #c92a2a !important;
        }
        .quiz-btn.wrong strong { color: #c92a2a !important; }

        /* Нижняя панель ввода */
        .chat-input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #f0e6df;
            position: relative;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
        }

        .chat-input-wrapper.active-input {
            background: #ffffff;
            border-color: #2b7de9;
            box-shadow: 0 0 0 3px rgba(43, 125, 233, 0.15);
        }

        .fake-input {
            flex: 1;
            font-size: 15px;
            color: #a0aec0;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .fake-input.filled {
            color: #1a202c;
        }

        .send-button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #cbd5e1;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: not-allowed;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-button.active {
            background: #2b7de9;
            cursor: pointer;
        }

        .send-button.pulse {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(43, 125, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0); }
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            fill: white;
            transform: translateX(1px);
        }

        .tooltip-hint {
            position: absolute;
            top: -38px;
            right: 26px;
            background: #334155;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: none;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tooltip-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-hint::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 16px;
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #334155 transparent;
        }

        /* Анимация печатания */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            align-items: center;
            justify-content: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #a0aec0;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar" id="headerAvatar"></div>
            <div class="chat-header-info">
                <h3>Главный инженер ИИваныч</h3>
                <p>В сети</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <div class="tooltip-hint" id="tooltipHint">Нажмите отправить, чтобы продолжить дальше</div>
            <div class="chat-input-wrapper" id="inputWrapper">
                <div class="fake-input" id="inputField">Напишите сообщение...</div>
                <button class="send-button" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

<script>
    const defaultAvatarSVG = `
        <svg viewBox="0 0 100 100" width="40" height="40">
            <circle cx="50" cy="50" r="50" fill="#2b7de9"/>
            <path d="M50,18c8.8,0,16,7.2,16,16c0,8.8-7.2,16-16,16c-8.8,0-16-7.2-16-16C34,25.2,41.2,18,50,18z M72.8,70.5
            C71.3,66,68.7,62.1,65.1,59C60.7,55.3,55.3,53.5,50,53.5s-10.7,1.8-15.1,5.5c-3.6,3.1-6.2,7-7.7,11.5
            c-1.3,4.1-1.2,8.6,0.3,12.7c1.3,3.5,3.9,6.3,7.2,8c3.2,1.6,6.9,2.4,10.6,2.4H50c3.7,0,7.4-0.8,10.6-2.4
            c3.3-1.7,5.9-4.5,7.2-8C73.9,79.1,74,74.6,72.8,70.5z" fill="white"/>
        </svg>
    `;

    document.getElementById('headerAvatar').innerHTML = defaultAvatarSVG;

    const chatMessages = document.getElementById('chatMessages');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const tooltipHint = document.getElementById('tooltipHint');

    let currentState = 0;

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-row teacher';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble" style="padding: 10px 14px;">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        chatMessages.appendChild(indicator);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function appendMessage(sender, contentHTML) {
        const msgRow = document.createElement('div');
        msgRow.className = `message-row ${sender}`;
        
        msgRow.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble">${contentHTML}</div>
        `;
        
        chatMessages.appendChild(msgRow);
        scrollToBottom();
    }

    function prepareNextStudentAction(text) {
        inputField.innerText = text;
        inputField.classList.add('filled');
        inputWrapper.classList.add('active-input');
        sendBtn.removeAttribute('disabled');
        sendBtn.classList.add('active', 'pulse');
        tooltipHint.classList.add('show');
    }

    function resetInputArea() {
        inputField.innerText = "Напишите сообщение...";
        inputField.classList.remove('filled');
        inputWrapper.classList.remove('active-input');
        sendBtn.setAttribute('disabled', 'true');
        sendBtn.classList.remove('active', 'pulse');
        tooltipHint.classList.remove('show');
    }

    // Управление ходом сценария чата
    function runDialogueStep() {
        if (currentState === 0) {
            // Первый запуск — подготавливаем первый вопрос ученика
            currentState = 1;
            prepareNextStudentAction("Что такое mymeet.ai?");
        } 
        else if (currentState === 1) {
            resetInputArea();
            appendMessage('student', 'Что такое mymeet.ai?');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p>Это облачный сервис, работающий как AI-слой поверх звонков и встреч. Он подключается к популярным ВКС-платформам (Zoom, Google Meet, Яндекс.Телемост, Microsoft Teams, СалютДжаз), автоматически записывает совещание и делает транскрипт с разбивкой по спикерам.</p>`);
                
                currentState = 2;
                setTimeout(() => {
                    prepareNextStudentAction("What does it do besides transcription?");
                    // Корректируем под русский текст из ТЗ
                    inputField.innerText = "Что он умеет, кроме транскрибации?";
                }, 1000);
            }, 1800);
        }
        else if (currentState === 2) {
            resetInputArea();
            appendMessage('student', 'Что он умеет, кроме транскрибации?');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const features = `
                    <p><strong>Основные возможности mymeet.ai:</strong></p>
                    <ul>
                        <li><strong>Транскрипция</strong> — точность до 95-98% при хорошем качестве записи. Поддерживает 73 языка с автоопределением.</li>
                        <li><strong>AI-отчеты</strong> — 9 шаблонов: «Обычная встреча», «Встреча с клиентом», «Коуч по продажам», «HR-интервью», «Исследование», «Медицина», «Протокол» и другие.</li>
                        <li><strong>AI-чат</strong> — можно задавать вопросы по содержанию встречи: «О чем договорились?», «Какие возражения были у клиента?», «Составь таблицу задач с дедлайнами».</li>
                        <li><strong>Выделение задач</strong> — автоматически фиксирует договоренности и ответственных.</li>
                    </ul>
                `;
                appendMessage('teacher', features);
                
                currentState = 3;
                setTimeout(() => {
                    prepareNextStudentAction("А как его внедрить в компании?");
                }, 1500);
            }, 2200);
        }
        else if (currentState === 3) {
            resetInputArea();
            appendMessage('student', 'А как его внедрить в компании?');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const integrations = `
                    <p><strong>Интеграция происходит через несколько каналов:</strong></p>
                    <ul>
                        <li><strong>Подключение календарей</strong> — Google Calendar, Яндекс.Календарь, Exchange. Бот автоматически присоединяется ко всем встречам.</li>
                        <li><strong>Telegram-бот</strong> — принимает ссылки на встречи и возвращает отчет.</li>
                        <li><strong>amoCRM</strong> — автоматически создает примечания к сделкам.</li>
                        <li><strong>Загрузка файлов</strong> — можно загрузить аудио- или видеофайл и получить транскрипт.</li>
                    </ul>
                `;
                appendMessage('teacher', integrations);
                
                currentState = 4;
                setTimeout(() => {
                    prepareNextStudentAction("А какие тарифы? Какую версию купить?");
                }, 1500);
            }, 2000);
        }
        else if (currentState === 4) {
            resetInputArea();
            appendMessage('student', 'А какие тарифы? Какую версию купить?');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const tariffs = `
                    <p><strong>Есть три тарифа:</strong></p>
                    <ul>
                        <li><strong>Free</strong> — 180 минут в месяц бесплатно, 10 запросов в AI-чат, интеграции с Zoom и Google Meet. Подходит для тестирования.</li>
                        <li><strong>Lite</strong> — 500 минут записи, 10 запросов в AI-чат, безлимитное хранение. Для индивидуального использования.</li>
                        <li><strong>Pro, Business</strong> — расширенные лимиты, больше AI-запросов, все интеграции, командный доступ. Для активной работы с большим количеством встреч.</li>
                    </ul>
                    <p style="margin-top: 8px;">Начните с бесплатного тарифа. Протестируйте на 2-3 реальных планерках. Когда поймете, что сервис полезен, можете перейти на платный тариф.</p>
                `;
                appendMessage('teacher', tariffs);
                
                currentState = 5;
                setTimeout(() => {
                    prepareNextStudentAction("А как его подключить?");
                }, 1500);
            }, 2200);
        }
        else if (currentState === 5) {
            resetInputArea();
            appendMessage('student', 'А как его подключить?');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const steps = `
                    <p><strong>Пошаговая инструкция по подключению mymeet.ai:</strong></p>
                    <ol>
                        <li><strong>Регистрация.</strong> Перейдите на mymeet.ai, нажмите «Попробовать бесплатно», введите почту и пароль или войдите через Google-аккаунт. После регистрации вы получите 180 бесплатных минут для тестирования.</li>
                        <li><strong>Подключение календаря.</strong> В разделе «Настройки и интеграции» подключите Google Calendar, Яндекс.Календарь или Outlook. Бот будет автоматически присоединяться ко всем встречам, в которых есть ссылка на видеозвонок.</li>
                        <li><strong>Ручное добавление встречи.</strong> Нажмите «Добавить встречу» → вставьте ссылку на Zoom, Google Meet или другой сервис для конференций → выберите шаблон отчета → нажмите «Записать встречу». Бот присоединится за 2–3 минуты.</li>
                        <li><strong>Загрузка файла.</strong> Можно загрузить готовую аудио- или видеозапись, и сервис расшифрует ее и подготовит отчет.</li>
                    </ol>
                `;
                appendMessage('teacher', steps);
                
                currentState = 6;
                setTimeout(() => {
                    prepareNextStudentAction("А как научиться им пользоваться?");
                }, 1500);
            }, 2500);
        }
        else if (currentState === 6) {
            resetInputArea();
            appendMessage('student', 'А как научиться им пользоваться?');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const tutorial = `
                    <p>Освоить mymeet.ai можно за один день:</p>
                    <ul>
                        <li>На сайте mymeet.ai есть блог с подробным руководством для новичков — от регистрации до настройки авто-записи.</li>
                        <li>Проведите 2-3 пробные планерки с включенным ботом. Сравните ручной протокол с AI-отчетом — вы увидите разницу.</li>
                        <li>Попробуйте задать вопросы в AI-чате по транскрипту: «Какие задачи были поставлены?», «Кто ответственный за поставку?», «Выдели все сроки».</li>
                        <li>Научитесь выгружать отчеты в PDF, DOCX или отправлять их в Telegram — это заменит ручную подготовку протоколов.</li>
                    </ul>
                `;
                appendMessage('teacher', tutorial);
                
                currentState = 7;
                setTimeout(() => {
                    prepareNextStudentAction("А как такой же подход применить к другим процессам, например к обработке почты?");
                }, 1500);
            }, 2200);
        }
        else if (currentState === 7) {
            resetInputArea();
            appendMessage('student', 'А как такой же подход применить к другим процессам, например к обработке почты?');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const mailAutomation = `
                    <p>Отличный вопрос! Для автоматизации почты можно использовать связку <strong>ChatGPT + Zapier</strong>. А пример промпта для ИИ-агента ГИПа выглядит так:</p>
                    <div class="prompt-example-card">
                        «Ты — ассистент главного инженера проекта. Каждое утро проверяй почту, выбирай письма от заказчиков и подрядчиков. По каждому напиши: суть, срок реакции, риски, проект решения. Отправляй сводку мне в Telegram к 9:00.»
                    </div>
                    <p>Этот промпт настраивается в связке с Gmail и Telegram через сервисы автоматизации.</p>
                `;
                appendMessage('teacher', mailAutomation);
                
                currentState = 8;
                setTimeout(() => {
                    prepareNextStudentAction("Давайте закрепим материал.");
                }, 1500);
            }, 2500);
        }
        else if (currentState === 8) {
            resetInputArea();
            appendMessage('student', 'Давайте закрепим материал.');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const quizBlock = `
                    <p><strong>Выберите, какой результат реален после внедрения mymeet.ai в работу ГИПа.</strong></p>
                    <p style="margin-top: 6px; font-size: 14px; color: #475569;">ГИП внедрил mymeet.ai для записи планерок. Через месяц он заметил, что:</p>
                    
                    <div class="quiz-container">
                        <button class="quiz-btn" id="optA" onclick="selectAnswer('A')">
                            <strong>Вариант А</strong>
                            Время на подготовку протоколов сократилось с 5 до 0,5 часов в неделю, все договоренности фиксируются автоматически, а пропущенные встречи можно восстановить по AI-отчету.
                        </button>
                        <button class="quiz-btn" id="optB" onclick="selectAnswer('B')">
                            <strong>Вариант Б</strong>
                            Сервис сам начал выдавать задания подрядчикам, контролировать сроки и вносить изменения в календарный план без участия ГИПа.
                        </button>
                    </div>
                `;
                appendMessage('teacher', quizBlock);
                currentState = 9; // Конец сценария ввода, управление переходит на кнопки квиза
            }, 1500);
        }
    }

    // Проверка выбора в квизе с цветовой подсветкой
    function selectAnswer(choice) {
        const btnA = document.getElementById('optA');
        const btnB = document.getElementById('optB');
        
        btnA.setAttribute('disabled', 'true');
        btnB.setAttribute('disabled', 'true');

        if (choice === 'A') {
            btnA.classList.add('correct');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p><strong>Верно!</strong> Так работает mymeet.ai в реальной практике.</p><p>Mymeet.ai не заменяет ГИПа, он снимает рутину. Управленческие решения, выдача заданий и контроль сроков остаются за руководителем. 🎉</p>`);
            }, 1400);
        } else {
            btnB.classList.add('wrong');
            btnA.classList.add('correct'); // Подсвечиваем верный для закрепления материала
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p><strong>Неверно.</strong> Этот вариант описывает возможность, которой нет у mymeet.ai.</p><p>Сервис не принимает решения за ГИПа, не контролирует сроки и не выдает задания подрядчикам. Всё это — задачи человека, ИИ лишь убирает рутину бумажной работы.</p>`);
            }, 1400);
        }
    }

    sendBtn.addEventListener('click', () => {
        if (!sendBtn.hasAttribute('disabled')) {
            runDialogueStep();
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        runDialogueStep();
    });
</script>
