<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный чат-обучение для ГИП: Сравнение технологий</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff3eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Times New Roman, Arial, sans-serif;
            color: #1a1a1a;
            display: block;
            min-height: 100vh;
            padding: 20px;
        }

        /* Широкий контейнер чата для iframe-вставок */
        .chat-container {
            max-width: 760px;
            width: 100%;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            height: 85vh;
            min-height: 600px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Шапка чата */
        .chat-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #f0e6df;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #111;
        }

        .chat-header-info p {
            font-size: 13px;
            color: #757575;
        }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafaf9;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #e0d5ce;
            border-radius: 4px;
        }

        /* Элементы сообщений */
        .message-row {
            display: flex;
            gap: 10px;
            max-width: 90%;
            animation: messageAppear 0.4s ease-out forwards;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.teacher {
            align-self: flex-start;
        }

        .message-row.student {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 85%;
        }

        /* Аватар-заглушка в стиле WhatsApp */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Базовая стилизация баблов сообщений */
        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            width: 100%;
        }

        .teacher .message-bubble {
            background: #ffffff;
            color: #1a1a1a;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        .student .message-bubble {
            background: #2b7de9;
            color: #ffffff;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.2);
        }

        .message-bubble p {
            margin-bottom: 8px;
        }
        .message-bubble p:last-child {
            margin-bottom: 0;
        }
        .message-bubble ul {
            margin-left: 18px;
            margin-bottom: 10px;
        }
        .message-bubble ul:last-child {
            margin-bottom: 0;
        }
        .message-bubble li {
            margin-bottom: 6px;
        }

        /* Выделяющийся блок / Лампочка */
        .warning-card {
            background: #fff9db;
            border-left: 4px solid #fcc419;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            display: flex;
            gap: 12px;
            color: #2b2b2b;
            font-size: 14px;
            line-height: 1.4;
        }

        .warning-card .bulb {
            font-size: 20px;
            line-height: 1;
        }

        /* Окошко ввода данных для сравнения */
        .compare-box {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            width: 100%;
        }

        .compare-box-title {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .compare-input-tags {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .compare-tag {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            color: #334155;
            font-weight: 500;
        }

        .compare-btn {
            background: #2b7de9;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-family: inherit;
        }

        .compare-btn:hover {
            background: #1e6cd2;
        }

        .compare-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        /* Стилизация сгенерированной ИИ таблицы */
        .comparison-result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            font-size: 14px;
            display: none;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        .comparison-result-table th, .comparison-result-table td {
            border: 1px solid #cbd5e1;
            padding: 10px;
            text-align: left;
            line-height: 1.4;
        }

        .comparison-result-table th {
            background-color: #f1f5f9;
            color: #1e293b;
            font-weight: 600;
        }

        .recommendation-row {
            margin-top: 12px;
            padding: 12px;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 6px;
            color: #166534;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        /* Тест / Квиз */
        .quiz-container {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .quiz-btn {
            background: #f1f3f5;
            border: 1px solid #e9ecef;
            padding: 14px;
            border-radius: 12px;
            text-align: left;
            font-size: 14px;
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
            font-family: inherit;
        }

        .quiz-btn:hover:not(:disabled) {
            background: #e8ecef;
            border-color: #ced4da;
        }

        /* Цветовая подсветка ответов квиза */
        .quiz-btn.correct {
            background: #d3f9d8 !important;
            border-color: #b2f2bb !important;
            color: #2b8a3e !important;
            font-weight: 500;
        }

        .quiz-btn.wrong {
            background: #ffe3e3 !important;
            border-color: #ffa8a8 !important;
            color: #c92a2a !important;
        }

        /* Нижняя панель ввода */
        .chat-input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #f0e6df;
            position: relative;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
        }

        .chat-input-wrapper.active-input {
            background: #ffffff;
            border-color: #2b7de9;
            box-shadow: 0 0 0 3px rgba(43, 125, 233, 0.15);
        }

        .fake-input {
            flex: 1;
            font-size: 15px;
            color: #a0aec0;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .fake-input.filled {
            color: #1a202c;
        }

        .send-button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #cbd5e1;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: not-allowed;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-button.active {
            background: #2b7de9;
            cursor: pointer;
        }

        .send-button.pulse {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(43, 125, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0); }
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            fill: white;
            transform: translateX(1px);
        }

        .tooltip-hint {
            position: absolute;
            top: -38px;
            right: 26px;
            background: #334155;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: none;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tooltip-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-hint::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 16px;
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #334155 transparent;
        }

        /* Анимация точек печатания */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            align-items: center;
            justify-content: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #a0aec0;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar" id="headerAvatar"></div>
            <div class="chat-header-info">
                <h3>Главный инженер ИИваныч</h3>
                <p>В сети</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <div class="tooltip-hint" id="tooltipHint">Нажмите отправить, чтобы продолжить дальше</div>
            <div class="chat-input-wrapper" id="inputWrapper">
                <div class="fake-input" id="inputField">Напишите сообщение...</div>
                <button class="send-button" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

<script>
    const defaultAvatarSVG = `
        <svg viewBox="0 0 100 100" width="40" height="40">
            <circle cx="50" cy="50" r="50" fill="#2b7de9"/>
            <path d="M50,18c8.8,0,16,7.2,16,16c0,8.8-7.2,16-16,16c-8.8,0-16-7.2-16-16C34,25.2,41.2,18,50,18z M72.8,70.5
            C71.3,66,68.7,62.1,65.1,59C60.7,55.3,55.3,53.5,50,53.5s-10.7,1.8-15.1,5.5c-3.6,3.1-6.2,7-7.7,11.5
            c-1.3,4.1-1.2,8.6,0.3,12.7c1.3,3.5,3.9,6.3,7.2,8c3.2,1.6,6.9,2.4,10.6,2.4H50c3.7,0,7.4-0.8,10.6-2.4
            c3.3-1.7,5.9-4.5,7.2-8C73.9,79.1,74,74.6,72.8,70.5z" fill="white"/>
        </svg>
    `;

    document.getElementById('headerAvatar').innerHTML = defaultAvatarSVG;

    const chatMessages = document.getElementById('chatMessages');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const tooltipHint = document.getElementById('tooltipHint');

    let currentState = 0;

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-row teacher';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble" style="padding: 10px 14px;">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        chatMessages.appendChild(indicator);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function appendMessage(sender, contentHTML) {
        const msgRow = document.createElement('div');
        msgRow.className = `message-row ${sender}`;
        
        msgRow.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble">${contentHTML}</div>
        `;
        
        chatMessages.appendChild(msgRow);
        scrollToBottom();
    }

    function prepareNextStudentAction(text) {
        inputField.innerText = text;
        inputField.classList.add('filled');
        inputWrapper.classList.add('active-input');
        sendBtn.removeAttribute('disabled');
        sendBtn.classList.add('active', 'pulse');
        tooltipHint.classList.add('show');
    }

    function resetInputArea() {
        inputField.innerText = "Напишите сообщение...";
        inputField.classList.remove('filled');
        inputWrapper.classList.remove('active-input');
        sendBtn.setAttribute('disabled', 'true');
        sendBtn.classList.remove('active', 'pulse');
        tooltipHint.classList.remove('show');
    }

    // Маршрутизация ходов диалога
    function runDialogueStep() {
        if (currentState === 0) {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p>Рынок меняется быстрее, чем вы успеваете читать новости. ИИ соберет сравнение технологий и поставщиков за минуты. Вы сможете сосредоточиться на выборе, а не на поиске.</p>`);
                
                currentState = 1;
                setTimeout(() => {
                    prepareNextStudentAction("Как нужно общаться с ИИ, чтобы подобрать себе подходящую информацию о материалах или об оборудовании?");
                }, 800);
            }, 1200);
        } 
        else if (currentState === 1) {
            resetInputArea();
            appendMessage('student', 'Как нужно общаться с ИИ, чтобы подобрать себе подходящую информацию о материалах или об оборудовании?');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const FormulaContent = `
                    <p>Полная стоимость владения — это не только закупка, но и монтаж, эксплуатация, ремонт, утилизация.</p>
                    <p style="margin-top: 6px;"><strong>Формула для ИИ:</strong><br>Сравни [вариант А] и [вариант Б] по критериям:</p>
                    <ul>
                        <li>Цена закупки.</li>
                        <li>Срок монтажа.</li>
                        <li>Энергопотребление, эксплуатация (10 лет).</li>
                        <li>Надежность, частота ремонта.</li>
                        <li>Совместимость с существующими системами.</li>
                    </ul>
                    <p>Результат оформи в виде таблицы с баллами 1-5 по каждому критерию + итоговая рекомендация.</p>
                    
                    <div class="warning-card">
                        <div class="bulb">💡</div>
                        <div><strong>Важно учитывать следующие параметры:</strong><br>
                        • Указывайте актуальные тарифы на энергию, зарплату монтажников.<br>
                        • Проверяйте, что ИИ не выдумывает характеристики оборудования.<br>
                        • Итоговое решение принимайте вы, ИИ только структурирует данные.</div>
                    </div>
                `;
                appendMessage('teacher', FormulaContent);
                
                currentState = 2;
                setTimeout(() => {
                    prepareNextStudentAction("Как это будет выглядеть на практике?");
                }, 1500);
            }, 2200);
        }
        else if (currentState === 2) {
            resetInputArea();
            appendMessage('student', 'Как это будет выглядеть на практике?');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const examplePrompt = `
                    <p>Рассмотрим пример промпта для сравнения гидроизоляции:</p>
                    <p style="margin: 8px 0; font-size: 14px; background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-style: italic; color: #475569;">
                        «Ты - инженер-строитель со стажем 10 лет. Сравни два варианта гидроизоляции подземного паркинга: напыляемую ПВХ-мембрану и бентонитовые маты. Критерии: скорость монтажа на 1000 м², стоимость материалов, risk повреждения, ремонтопригодность через 5 лет. Выведи таблицу и дай итоговую рекомендацию.»
                    </p>
                `;
                appendMessage('teacher', examplePrompt);
                
                currentState = 3;
                setTimeout(() => {
                    prepareNextStudentAction("Попробуем его ввести!");
                }, 1200);
            }, 2000);
        }
        else if (currentState === 3) {
            resetInputArea();
            appendMessage('student', 'Попробуем его ввести!');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const widgetCompare = `
                    <p>Нажмите на варианты для примера и посмотрите, какой результат выдаст нейросеть:</p>
                    <div class="compare-box">
                        <div class="compare-box-title">⚖️ Модуль экспресс-анализа технологий</div>
                        <div class="compare-input-tags">
                            <div class="compare-tag">⚡ Вариант А: Напыляемая ПВХ-мембрана</div>
                            <div class="compare-tag">⚡ Вариант Б: Бентонитовые маты</div>
                        </div>
                        <button class="compare-btn" id="runCompareBtn" onclick="triggerAILayerComparison()">Сравнить материалы</button>
                        
                        <table class="comparison-result-table" id="comparisonTable">
                            <thead>
                                <tr>
                                    <th>Критерий</th>
                                    <th>Напыляемая ПВХ-мембрана</th>
                                    <th>Бентонитовые маты</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>Скорость монтажа (1000 м²)</strong></td>
                                    <td>Высокая</td>
                                    <td>Средняя</td>
                                </tr>
                                <tr>
                                    <td><strong>Стоимость материалов</strong></td>
                                    <td>~1800 руб/м²</td>
                                    <td>~1400 руб/м²</td>
                                </tr>
                                <tr>
                                    <td><strong>Риск повреждения</strong></td>
                                    <td>Проколы, требуется защита</td>
                                    <td>Самозалечивание, низкий</td>
                                </tr>
                                <tr>
                                    <td><strong>Ремонтопригодность через 5 лет</strong></td>
                                    <td>Сложный ремонт — вскрытие бетона</td>
                                    <td>Локальная замена мата</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="recommendation-row" id="recommendationBlock">
                            <strong>Рекомендация ИИ:</strong> Бентонитовые маты надежнее и экономичнее при устройстве пригрузочного слоя.
                        </div>
                    </div>
                `;
                appendMessage('teacher', widgetCompare);
                currentState = 4; // Ждем клика по кнопке внутри виджета
            }, 1800);
        }
        else if (currentState === 5) {
            resetInputArea();
            appendMessage('student', 'Отлично! Теперь закрепим материал.');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const quizBlock = `
                    <p><strong>Какой вывод можно сделать из этой таблицы?</strong></p>
                    
                    <div class="quiz-container">
                        <button class="quiz-btn" id="quizOpt1" onclick="selectQuizOption(1)">
                            1) ПВХ-мембрана лучше по всем критериям, использовать только ее.
                        </button>
                        <button class="quiz-btn" id="quizOpt2" onclick="selectQuizOption(2)">
                            2)  Бентонитовые маты дешевле и надежнее, но ПВХ-мембрана быстрее монтируется.
                        </button>
                    </div>
                `;
                appendMessage('teacher', quizBlock);
                currentState = 6;
            }, 1500);
        }
    }

    // Логика кнопки "Сравнить" внутри ИИ-виджета
    function triggerAILayerComparison() {
        const table = document.getElementById('comparisonTable');
        const rec = document.getElementById('recommendationBlock');
        const btn = document.getElementById('runCompareBtn');
        
        btn.setAttribute('disabled', 'true');
        btn.innerText = "Анализ завершен";
        table.style.display = "table";
        rec.style.display = "block";
        scrollToBottom();

        // Автоматически готовим шаг для студента
        currentState = 5;
        setTimeout(() => {
            prepareNextStudentAction("Отлично! Теперь закрепим материал.");
        }, 1500);
    }

    // Логика валидации финального квиза
    function selectQuizOption(selected) {
        const opt1 = document.getElementById('quizOpt1');
        const opt2 = document.getElementById('quizOpt2');
        
        opt1.setAttribute('disabled', 'true');
        opt2.setAttribute('disabled', 'true');

        if (selected === 2) {
            opt2.classList.add('correct');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p><strong>Верно!</strong> Вы правильно интерпретировали таблицу.</p><p>Бентонитовые маты экономичнее и устойчивее к повреждениям, хотя монтаж ПВХ-мембраны быстрее. Выбор зависит от приоритетов проекта. 🎉</p>`);
            }, 1400);
        } else {
            opt1.classList.add('wrong');
            opt2.classList.add('correct'); // Подсвечиваем правильный вариант для обучения
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p><strong>Неверно.</strong> Нет однозначного лидера по всем критериям — нужно смотреть на конкретные условия.</p><p>ПВХ-мембрана проигрывает по стоимости и ремонтопригодности, но выигрывает в скорости. Правильный ответ под номером 2.</p>`);
            }, 1400);
        }
    }

    sendBtn.addEventListener('click', () => {
        if (!sendBtn.hasAttribute('disabled')) {
            runDialogueStep();
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        runDialogueStep();
    });
</script>

</body>
</html>
