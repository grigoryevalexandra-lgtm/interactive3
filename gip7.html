<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный чат-обучение для ГИП: Генерация графики</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff3eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Times New Roman, Arial, sans-serif;
            color: #1a1a1a;
            display: block;
            min-height: 100vh;
            padding: 20px;
        }

        /* Расширенный контейнер чата для корректного отображения внутри iframe */
        .chat-container {
            max-width: 760px;
            width: 100%;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            height: 85vh;
            min-height: 600px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Шапка чата */
        .chat-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #f0e6df;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #111;
        }

        .chat-header-info p {
            font-size: 13px;
            color: #757575;
        }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafaf9;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #e0d5ce;
            border-radius: 4px;
        }

        /* Элементы сообщений */
        .message-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: messageAppear 0.4s ease-out forwards;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.teacher {
            align-self: flex-start;
        }

        .message-row.student {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 85%;
        }

        /* Аватар-заглушка в стиле WhatsApp */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Базовая стилизация баблов сообщений */
        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .teacher .message-bubble {
            background: #ffffff;
            color: #1a1a1a;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        .student .message-bubble {
            background: #2b7de9;
            color: #ffffff;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.2);
        }

        .message-bubble p {
            margin-bottom: 8px;
        }
        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        /* Окошко-симулятор ввода графического промпта */
        .prompt-generator-box {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 14px;
            margin: 10px 0;
            width: 100%;
        }

        .checker-title {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checker-textarea {
            width: 100%;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            color: #334155;
            line-height: 1.4;
            font-family: inherit;
            resize: none;
            margin-bottom: 10px;
        }

        .checker-btn {
            background: #2b7de9;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .checker-btn:hover {
            background: #1e6cd2;
        }

        .checker-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .checker-result {
            margin-top: 12px;
            padding: 12px;
            background: #f0fdf4;
            border-left: 4px solid #16a34a;
            border-radius: 4px;
            font-size: 14px;
            color: #14532d;
            line-height: 1.5;
            display: none;
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        /* Интерактивный чек-лист вопросов */
        .checklist-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 15px 0 10px 0;
            width: 100%;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .checklist-item:hover {
            background: #f1f5f9;
        }

        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 1px;
            cursor: pointer;
            accent-color: #2b7de9;
        }

        /* Подсветка элементов чек-листа зеленым и красным */
        .checklist-item.correct-cb {
            background-color: #d3f9d8 !important;
            border-color: #b2f2bb !important;
            color: #2b8a3e !important;
        }

        .checklist-item.wrong-cb {
            background-color: #ffe3e3 !important;
            border-color: #ffa8a8 !important;
            color: #c92a2a !important;
        }

        /* Кнопка проверки */
        .check-answers-btn {
            background: #2b7de9;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.2);
        }

        .check-answers-btn:hover:not(:disabled) {
            background: #1e6cd2;
        }

        .check-answers-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Нижняя панель ввода */
        .chat-input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #f0e6df;
            position: relative;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
        }

        .chat-input-wrapper.active-input {
            background: #ffffff;
            border-color: #2b7de9;
            box-shadow: 0 0 0 3px rgba(43, 125, 233, 0.15);
        }

        .fake-input {
            flex: 1;
            font-size: 15px;
            color: #a0aec0;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .fake-input.filled {
            color: #1a202c;
        }

        .send-button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #cbd5e1;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: not-allowed;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-button.active {
            background: #2b7de9;
            cursor: pointer;
        }

        .send-button.pulse {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(43, 125, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0); }
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            fill: white;
            transform: translateX(1px);
        }

        .tooltip-hint {
            position: absolute;
            top: -38px;
            right: 26px;
            background: #334155;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: none;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tooltip-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-hint::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 16px;
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #334155 transparent;
        }

        /* Анимация печатания */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            align-items: center;
            justify-content: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #a0aec0;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar" id="headerAvatar"></div>
            <div class="chat-header-info">
                <h3>Главный инженер ИИваныч</h3>
                <p>В сети</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <div class="tooltip-hint" id="tooltipHint">Нажмите отправить, чтобы продолжить дальше</div>
            <div class="chat-input-wrapper" id="inputWrapper">
                <div class="fake-input" id="inputField">Напишите сообщение...</div>
                <button class="send-button" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

<script>
    const defaultAvatarSVG = `
        <svg viewBox="0 0 100 100" width="40" height="40">
            <circle cx="50" cy="50" r="50" fill="#2b7de9"/>
            <path d="M50,18c8.8,0,16,7.2,16,16c0,8.8-7.2,16-16,16c-8.8,0-16-7.2-16-16C34,25.2,41.2,18,50,18z M72.8,70.5
            C71.3,66,68.7,62.1,65.1,59C60.7,55.3,55.3,53.5,50,53.5s-10.7,1.8-15.1,5.5c-3.6,3.1-6.2,7-7.7,11.5
            c-1.3,4.1-1.2,8.6,0.3,12.7c1.3,3.5,3.9,6.3,7.2,8c3.2,1.6,6.9,2.4,10.6,2.4H50c3.7,0,7.4-0.8,10.6-2.4
            c3.3-1.7,5.9-4.5,7.2-8C73.9,79.1,74,74.6,72.8,70.5z" fill="white"/>
        </svg>
    `;

    document.getElementById('headerAvatar').innerHTML = defaultAvatarSVG;

    const chatMessages = document.getElementById('chatMessages');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const tooltipHint = document.getElementById('tooltipHint');

    let currentState = 0;

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-row teacher';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble" style="padding: 10px 14px;">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        chatMessages.appendChild(indicator);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function appendMessage(sender, contentHTML) {
        const msgRow = document.createElement('div');
        msgRow.className = `message-row ${sender}`;
        
        msgRow.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble">${contentHTML}</div>
        `;
        
        chatMessages.appendChild(msgRow);
        scrollToBottom();
    }

    function prepareNextStudentAction(text) {
        inputField.innerText = text;
        inputField.classList.add('filled');
        inputWrapper.classList.add('active-input');
        sendBtn.removeAttribute('disabled');
        sendBtn.classList.add('active', 'pulse');
        tooltipHint.classList.add('show');
    }

    function resetInputArea() {
        inputField.innerText = "Напишите сообщение...";
        inputField.classList.remove('filled');
        inputWrapper.classList.remove('active-input');
        sendBtn.setAttribute('disabled', 'true');
        sendBtn.classList.remove('active', 'pulse');
        tooltipHint.classList.remove('show');
    }

    // Маршрутизация шагов диалога
    function runDialogueStep() {
        if (currentState === 0) {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p>Запрос «нарисуй узел кровли» даст фотореалистичную картинку с деревьями и солнцем — красиво, но бесполезно для согласования.</p>`);
                
                currentState = 1;
                setTimeout(() => {
                    prepareNextStudentAction("А как нужно задавать вопросы?");
                }, 800);
            }, 1200);
        } 
        else if (currentState === 1) {
            resetInputArea();
            appendMessage('student', 'А как нужно задавать вопросы?');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const widgetContent = `
                    <p>Пример:</p>
                    <div class="prompt-generator-box">
                        <div class="checker-title">🎨 Конструктор графических промптов</div>
                        <textarea class="checker-textarea" rows="6" readonly>«Схема разреза примыкания кровли к парапету. Линейный векторный стиль, белый фон. Подписи ключевых слоев на русском. Элементы: мембрана, прижимная планка, дюбель, герметик. Формат: SVG, 1200x800, без фотореализма.»</textarea>
                        <button class="checker-btn" id="sendPromptBtn" onclick="submitVisualPrompt()">Отправить промпт в нейросеть</button>
                        <div class="checker-result" id="promptResult">
                            <strong>[ИИ-Модель]:</strong> Сгенерирован схематичный векторный разрез узла (SVG, 1200x800) на чистом белом фоне. Добавлены выноски с русскими названиями слоев (мембрана, герметик, планка). Фотореалистичные шумы отсутствуют.
                        </div>
                    </div>
                `;
                appendMessage('teacher', widgetContent);
                currentState = 2; // Перевод управления на кнопку внутри виджета
            }, 1500);
        }
        else if (currentState === 3) {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                
                appendMessage('teacher', `<p>Визуал от ИИ — эскиз для презентации, но не рабочая документация. Не используйте вместо чертежей. Используйте разные нейросети для того, чтобы подобрать подходящий визуал под ваши задачи. <br><br>Например: <strong>Kandinskiy от GigaChat, YandexGPT, Qwen</strong>.</p>`);
                
                currentState = 4;
                setTimeout(() => {
                    prepareNextStudentAction("Хочу потренироваться.");
                }, 1200);
            }, 1000);
        }
        else if (currentState === 4) {
            resetInputArea();
            appendMessage('student', 'Хочу потренироваться.');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const quizContent = `
                    <p>Промпт: «Нарисуй примыкание кровли к стене» выдал фотореалистичную картинку с деревьями. Чего не хватает для рабочего эскиза? <strong>Выберите 2 правильных варианта:</strong></p>
                    
                    <div class="checklist-container" id="visualChecklist">
                        <label class="checklist-item" data-correct="true"><input type="checkbox"> <span>1) Линейный, схематичный стиль без фона</span></label>
                        <label class="checklist-item" data-correct="true"><input type="checkbox"> <span>2) Подписи элементов на русском языке</span></label>
                        <label class="checklist-item" data-correct="false"><input type="checkbox"> <span>3) Фотореализм и теневые эффекты</span></label>
                    </div>

                    <button class="check-answers-btn" id="verifyVisualBtn" onclick="evaluateVisualQuiz()">Проверить ответы</button>
                `;
                appendMessage('teacher', quizContent);
                currentState = 5;
            }, 1500);
        }
    }

    // Симуляция отправки промпта в ИИ-генератор
    function submitVisualPrompt() {
        const resultDiv = document.getElementById('promptResult');
        const actionBtn = document.getElementById('sendPromptBtn');
        
        actionBtn.setAttribute('disabled', 'true');
        actionBtn.innerText = "Промпт обработан";
        resultDiv.style.display = "block";
        scrollToBottom();

        // Автоматически запускаем следующую реплику преподавателя
        currentState = 3;
        runDialogueStep();
    }

    // Валидация чек-листа с зелено-красной подсветкой
    function evaluateVisualQuiz() {
        const container = document.getElementById('visualChecklist');
        const items = container.querySelectorAll('.checklist-item');
        let isPerfect = true;

        items.forEach(item => {
            const checkbox = item.querySelector('input[type="checkbox"]');
            const shouldBeChecked = item.getAttribute('data-correct') === 'true';
            
            checkbox.setAttribute('disabled', 'true');
            item.style.pointerEvents = 'none';

            if (checkbox.checked === shouldBeChecked) {
                if (checkbox.checked) {
                    item.classList.add('correct-cb'); // Правильно выбранный чекбокс
                }
            } else {
                item.classList.add('wrong-cb'); // Ошибочно выбранный или пропущенный
                isPerfect = false;
            }
        });

        const actionBtn = document.getElementById('verifyVisualBtn');

        if (isPerfect) {
            actionBtn.innerText = "Отлично!";
            actionBtn.style.background = "#2b8a3e";
            actionBtn.setAttribute('disabled', 'true');

            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<strong>Ответы: 1) и 2) — Верно!</strong> Вы абсолютно правы. Для создания полноценного рабочего или технического эскиза критически важен именно линейный чертёжный стиль без отвлекающего бэкграунда, а также чёткие текстовые подписи элементов на русском языке. Фотореализм (3) только вредит согласованию конструктива! 🎉`);
            }, 1500);
        } else {
            actionBtn.innerText = "Есть ошибки";
            actionBtn.style.background = "#c92a2a";
            actionBtn.setAttribute('disabled', 'true');

            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<strong>Не совсем точно.</strong> Правильные ответы — 1) и 2). Нейросети по умолчанию стремятся выдать красивый фотореалистичный кадр, но для инженерных задач этот эффект (3) бесполезен. Всегда явно прописывайте в промптах требование к линейному стилю и текстовым подписям.`);
            }, 1500);
        }
    }

    sendBtn.addEventListener('click', () => {
        if (!sendBtn.hasAttribute('disabled')) {
            runDialogueStep();
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        runDialogueStep();
    });
</script>

</body>
</html>
