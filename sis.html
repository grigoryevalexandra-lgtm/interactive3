<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта внедрения «Акцент-Стройнадзор»</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff3eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            padding: 40px 20px;
            min-height: 100vh;
            display: block;
        }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Заголовок по левому краю */
        h2 {
            font-size: 26px;
            font-weight: 700;
            color: #111111;
            margin-bottom: 12px;
            line-height: 1.3;
            text-align: left;
        }

        /* Подзаголовок по левому краю */
        .subtitle {
            font-size: 18px;
            color: #555555;
            margin-bottom: 35px;
            text-align: left;
        }

        /* Плашки теперь центрируются в контейнере */
        .regions-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-bottom: 40px;
        }

        /* Базовый стиль карточки региона */
        .region-card {
            padding: 12px 20px;
            border-radius: 32px;
            font-size: 15px;
            font-weight: 500;
            color: #2c3e50;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.04);
            user-select: none;
            cursor: default;
            
            /* Начальное состояние до анимации */
            opacity: 0;
            /* Ещё более размеренное и плавное время анимации (1.6s) */
            transition: transform 1.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.6s ease;
        }

        /* Эффект при наведении */
        .region-card:hover {
            transform: scale(1.05) translateY(-2px) !important;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.06);
        }

        /* Финальное состояние — возвращаем в исходную точку */
        .region-card.appeared {
            opacity: 1;
            transform: translate(0, 0) scale(1) !important;
        }

        /* Пастельная цветовая палитра */
        .color-1 { background-color: #d9f0f4; border-left: 3px solid #a3e2ec; }
        .color-2 { background-color: #e2f0d9; border-left: 3px solid #c2e2af; }
        .color-3 { background-color: #ebd9f4; border-left: 3px solid #d7b4ec; }
        .color-4 { background-color: #fce4db; border-left: 3px solid #f7c5b3; }
        .color-5 { background-color: #fdf2d0; border-left: 3px solid #f9e198; }
    </style>
</head>
<body>

<div class="wrapper" id="interactiveContainer">
    <h2>В каких регионах ГСН уже использует инфосистему «Акцент-Стройнадзор»</h2>
    <div class="subtitle">Систему «Акцент-Стройнадзор» уже применяют в:</div>
    
    <div class="regions-grid" id="grid">
        </div>
</div>

<script>
    const regions = [
        "Нижегородской области", "Челябинской области", "Свердловской области", 
        "Иркутской области", "Томской области", "Тюменской области", 
        "Оренбургской области", "Курганской области", "Омской области", 
        "Амурской области", "Новосибирской области", "Саратовской области", 
        "Смоленской области", "Курской области", "Мурманской области", 
        "Ростовской области", "Рязанской области", "Алтайском крае", 
        "Республике Дагестан", "Республике Карелия", "Республике Марий Эл", 
        "Республике Удмуртия", "Республике Крым", "Красноярском крае", 
        "Камчатском крае", "Хабаровском крае"
    ];

    const grid = document.getElementById('grid');

    function buildGrid() {
        grid.innerHTML = '';
        regions.forEach((region, index) => {
            const card = document.createElement('div');
            
            const colorClass = `color-${(index % 5) + 1}`;
            card.className = `region-card ${colorClass}`;
            card.innerText = region;
            
            // Генерируем случайную стартовую позицию для разлета (от -120px до +120px)
            const randomX = Math.floor((Math.random() - 0.5) * 240);
            const randomY = Math.floor((Math.random() - 0.5) * 240);
            
            // Задаем индивидуальный хаотичный старт
            card.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.7)`;
            
            grid.appendChild(card);
        });
    }

    function startCascadeAnimation() {
        buildGrid();
        
        const cards = document.querySelectorAll('.region-card');
        cards.forEach((card, index) => {
            setTimeout(() => {
                card.classList.add('appeared');
            }, index * 350); // Интервал между появлением плашек увеличен до 350мс
        });
    }

    // Автоматический старт при прокрутке до интерактива
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                startCascadeAnimation();
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    observer.observe(document.getElementById('interactiveContainer'));
</script>

</body>
</html>
