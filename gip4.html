<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный чат-обучение для ГИП: Обработка голосовых</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff3eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Times New Roman, Arial, sans-serif;
            color: #1a1a1a;
            display: block;
            min-height: 100vh;
            padding: 20px;
        }

        /* Оптимизированная ширина чата под размеры iframe-блоков */
        .chat-container {
            max-width: 760px;
            width: 100%;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            height: 85vh;
            min-height: 600px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Шапка чата */
        .chat-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #f0e6df;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #111;
        }

        .chat-header-info p {
            font-size: 13px;
            color: #757575;
        }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafaf9;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #e0d5ce;
            border-radius: 4px;
        }

        /* Элементы сообщений */
        .message-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: messageAppear 0.4s ease-out forwards;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.teacher {
            align-self: flex-start;
        }

        .message-row.student {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 85%;
        }

        /* Универсальный аватар-заглушка в стиле WhatsApp */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Базовая стилизация баблов сообщений */
        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .teacher .message-bubble {
            background: #ffffff;
            color: #1a1a1a;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        .student .message-bubble {
            background: #2b7de9;
            color: #ffffff;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.2);
        }

        .message-bubble p {
            margin-bottom: 8px;
        }
        .message-bubble p:last-child {
            margin-bottom: 0;
        }
        .message-bubble ul, .message-bubble ol {
            margin-left: 18px;
            margin-bottom: 10px;
        }
        .message-bubble ul:last-child, .message-bubble ol:last-child {
            margin-bottom: 0;
        }
        .message-bubble li {
            margin-bottom: 6px;
        }

        /* Оформление карточек-примеров ИИ внутри сообщений */
        .ai-code-block {
            font-size: 14px; 
            background: #f8fafc; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #e2e8f0; 
            color: #334155;
            margin: 8px 0;
        }

        .ai-result-block {
            font-size: 14px; 
            background: #f0fdf4; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #bbf7d0; 
            color: #166534;
            margin-top: 8px;
        }

        /* Стилизация интерактивного чек-листа */
        .checklist-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 15px 0 10px 0;
            width: 100%;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .checklist-item:hover {
            background: #f1f5f9;
        }

        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 1px;
            cursor: pointer;
            accent-color: #2b7de9;
        }

        /* Стили валидации чекбоксов после проверки */
        .checklist-item.correct-cb {
            background-color: #d3f9d8 !important;
            border-color: #b2f2bb !important;
            color: #2b8a3e !important;
        }

        .checklist-item.wrong-cb {
            background-color: #ffe3e3 !important;
            border-color: #ffa8a8 !important;
            color: #c92a2a !important;
        }

        /* Кнопка проверки */
        .check-answers-btn {
            background: #2b7de9;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.2);
        }

        .check-answers-btn:hover:not(:disabled) {
            background: #1e6cd2;
        }

        .check-answers-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Нижняя панель ввода */
        .chat-input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #f0e6df;
            position: relative;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
        }

        .chat-input-wrapper.active-input {
            background: #ffffff;
            border-color: #2b7de9;
            box-shadow: 0 0 0 3px rgba(43, 125, 233, 0.15);
        }

        .fake-input {
            flex: 1;
            font-size: 15px;
            color: #a0aec0;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .fake-input.filled {
            color: #1a202c;
        }

        .send-button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #cbd5e1;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: not-allowed;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-button.active {
            background: #2b7de9;
            cursor: pointer;
        }

        .send-button.pulse {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(43, 125, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0); }
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            fill: white;
            transform: translateX(1px);
        }

        .tooltip-hint {
            position: absolute;
            top: -38px;
            right: 26px;
            background: #334155;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: none;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tooltip-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-hint::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 16px;
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #334155 transparent;
        }

        /* Индикатор печатания */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            align-items: center;
            justify-content: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #a0aec0;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar" id="headerAvatar"></div>
            <div class="chat-header-info">
                <h3>Главный инженер ИИваныч</h3>
                <p>В сети</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <div class="tooltip-hint" id="tooltipHint">Нажмите отправить, чтобы продолжить дальше</div>
            <div class="chat-input-wrapper" id="inputWrapper">
                <div class="fake-input" id="inputField">Напишите сообщение...</div>
                <button class="send-button" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

<script>
    const defaultAvatarSVG = `
        <svg viewBox="0 0 100 100" width="40" height="40">
            <circle cx="50" cy="50" r="50" fill="#2b7de9"/>
            <path d="M50,18c8.8,0,16,7.2,16,16c0,8.8-7.2,16-16,16c-8.8,0-16-7.2-16-16C34,25.2,41.2,18,50,18z M72.8,70.5
            C71.3,66,68.7,62.1,65.1,59C60.7,55.3,55.3,53.5,50,53.5s-10.7,1.8-15.1,5.5c-3.6,3.1-6.2,7-7.7,11.5
            c-1.3,4.1-1.2,8.6,0.3,12.7c1.3,3.5,3.9,6.3,7.2,8c3.2,1.6,6.9,2.4,10.6,2.4H50c3.7,0,7.4-0.8,10.6-2.4
            c3.3-1.7,5.9-4.5,7.2-8C73.9,79.1,74,74.6,72.8,70.5z" fill="white"/>
        </svg>
    `;

    document.getElementById('headerAvatar').innerHTML = defaultAvatarSVG;

    const chatMessages = document.getElementById('chatMessages');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const tooltipHint = document.getElementById('tooltipHint');

    let currentState = 0;

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-row teacher';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble" style="padding: 10px 14px;">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        chatMessages.appendChild(indicator);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function appendMessage(sender, contentHTML) {
        const msgRow = document.createElement('div');
        msgRow.className = `message-row ${sender}`;
        
        msgRow.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble">${contentHTML}</div>
        `;
        
        chatMessages.appendChild(msgRow);
        scrollToBottom();
    }

    function prepareNextStudentAction(text) {
        inputField.innerText = text;
        inputField.classList.add('filled');
        inputWrapper.classList.add('active-input');
        sendBtn.removeAttribute('disabled');
        sendBtn.classList.add('active', 'pulse');
        tooltipHint.classList.add('show');
    }

    function resetInputArea() {
        inputField.innerText = "Напишите сообщение...";
        inputField.classList.remove('filled');
        inputWrapper.classList.remove('active-input');
        sendBtn.setAttribute('disabled', 'true');
        sendBtn.classList.remove('active', 'pulse');
        tooltipHint.classList.remove('show');
    }

    // Маршрутизация шагов диалога
    function runDialogueStep() {
        if (currentState === 0) {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p>Для получения хорошего результата, нужно составить правильный промпт.</p>`);
                
                currentState = 1;
                setTimeout(() => {
                    prepareNextStudentAction("С чего начать?");
                }, 800);
            }, 1200);
        } 
        else if (currentState === 1) {
            resetInputArea();
            appendMessage('student', 'С чего начать?');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const structureContent = `
                    <p>Структура промпта для обработки голосового сообщения аналогична ранее рассмотренной:</p>
                    <ul style="margin-top: 6px;">
                        <li><strong>Роль:</strong> «Ты - помощник главного инженера проекта…»</li>
                        <li><strong>Цель:</strong> «Преобразуй голосовое сообщение в поручение»</li>
                        <li><strong>Ограничения:</strong> «Не додумывай детали, не используй разговорную лексику»</li>
                        <li><strong>Источники:</strong> «Расшифровка голосового сообщения: …»</li>
                        <li><strong>Формат ответа:</strong> «Задача, Решение, Ответственный, Срок»</li>
                        <li><strong>Проверка:</strong> «Убедись, что все проблемы отражены»</li>
                    </ul>
                `;
                appendMessage('teacher', structureContent);
                
                currentState = 2;
                setTimeout(() => {
                    prepareNextStudentAction("А как это будет выглядеть, покажи пример.");
                }, 1500);
            }, 2000);
        }
        else if (currentState === 2) {
            resetInputArea();
            appendMessage('student', 'А как это будет выглядеть, покажи пример.');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const exampleContent = `
                    <p>Вот как выглядит полностью собранный промпт:</p>
                    <div class="ai-code-block" style="font-style: italic;">
                        «Ты - помощник главного инженера проекта. Преобразуй неструктурированное голосовое сообщение прораба в формализованное поручение. Выдели проблему, предложи техническое решение и назначь ответственного со сроком. Не додумывай детали, которых нет в сообщении. Не используй разговорную лексику. Длина - не более трех пунктов. Расшифровка голосового сообщения: «Слушай, тут колонна по оси А/2 не входит в проем, арматура в упор. И электрики говорят, что кабель-каналы не заложили, придется штробить.» Выведи поручение в формате: «Задача», «Решение», «Ответственный», «Срок». Проверь, что все указанные в сообщении проблемы отражены, а решения не противоречат СП.»
                    </div>
                    <p style="margin-top: 10px;">Результат работы нейросети:</p>
                    <div class="ai-result-block">
                        <strong>Задача 1:</strong> Устранить коллизию осей А/2.<br>
                        <strong>Решение:</strong> сместить проем, выдать корректировку КЖ. <strong>Ответственный:</strong> Иванов. <strong>Срок:</strong> сегодня.<br><br>
                        <strong>Задача 2:</strong> Предусмотреть закладные под кабельные трассы.<br>
                        <strong>Решение:</strong> штрабы или накладной монтаж. <strong>Ответственный:</strong> Петров. <strong>Срок:</strong> завтра.
                    </div>
                `;
                appendMessage('teacher', exampleContent);
                
                currentState = 3;
                setTimeout(() => {
                    prepareNextStudentAction("А в каких нейросетях это можно сделать?");
                }, 1500);
            }, 2500);
        }
        else if (currentState === 3) {
            resetInputArea();
            appendMessage('student', 'А в каких нейросетях это можно сделать?');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const toolsContent = `
                    <p>Для транскрибации голосовых сообщений можно использовать:</p>
                    <ul style="margin-top: 6px;">
                        <li><strong>GigaChat</strong> — работает с голосовыми сообщениями на русском языке. Нейросеть воспринимает звук напрямую, без промежуточного преобразования в текст, что повышает точность.</li>
                        <li><strong>Speech2Text</strong> — просто загрузите файл и сервис транскрибирует его. Можно скачать готовый файл с таймкодом и без.</li>
                        <li><strong>AssemblyAI</strong> — преобразует голосовые сообщения прямо на веб-странице, но плохо распознает русский язык.</li>
                        <li><strong>ChatGPT Plus</strong> — умеет расшифровывать аудиофайлы напрямую. Вы просто прикрепляете аудио к сообщению, и модель возвращает текст расшифровки. В бесплатной версии расшифровка ограничена по 2 минуты.</li>
                    </ul>
                `;
                appendMessage('teacher', toolsContent);
                
                currentState = 4;
                setTimeout(() => {
                    prepareNextStudentAction("Отлично! Хочу потренироваться.");
                }, 1500);
            }, 2500);
        }
        else if (currentState === 4) {
            resetInputArea();
            appendMessage('student', 'Отлично! Хочу потренироваться.');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const exerciseContent = `
                    <p>Вы получили голосовое сообщение от прораба, преобразовали его в текст и отправили нейросети с промптом на формирование поручения. Ниже — расшифровка и готовое поручение.</p>
                    
                    <div class="ai-code-block" style="margin-top: 10px;">
                        <strong>Расшифровка голосового сообщения:</strong><br>
                        «Слушай, тут колонна по оси А/2 не входит в проём, арматура в упор. И электрики говорят, что кабель-каналы не заложили, придётся штробить.»
                    </div>
                    
                    <div class="ai-result-block">
                        <strong>Поручение от нейросети:</strong><br>
                        <strong>Задача 1:</strong> Устранить коллизию осей А/2.<br>
                        <strong>Решение:</strong> сместить проём, выдать корректировку КЖ.<br>
                        <strong>Ответственный:</strong> Иванов. <strong>Срок:</strong> сегодня.<br><br>
                        <strong>Задача 2:</strong> Предусмотреть закладные под кабельные трассы.<br>
                        <strong>Решение:</strong> штрабы или накладной монтаж.<br>
                        <strong>Ответственный:</strong> Петров. <strong>Срок:</strong> завтра.
                    </div>

                    <p style="margin-top: 15px; font-weight: 600; font-size: 14px; color: #475569;">Отметьте галочками те проблемы из расшифровки, которые действительно попали в поручение от ИИ:</p>
                    
                    <div class="checklist-container" id="tasksChecklist">
                        <label class="checklist-item" data-correct="true"><input type="checkbox"> <span>Колонна не входит в проём</span></label>
                        <label class="checklist-item" data-correct="false"><input type="checkbox"> <span>Арматура в упор</span></label>
                        <label class="checklist-item" data-correct="true"><input type="checkbox"> <span>Кабель-каналы не заложили</span></label>
                        <label class="checklist-item" data-correct="true"><input type="checkbox"> <span>Необходимость штробить</span></label>
                        <label class="checklist-item" data-correct="false"><input type="checkbox"> <span>Отсутствие материалов</span></label>
                        <label class="checklist-item" data-correct="false"><input type="checkbox"> <span>Погодные условия</span></label>
                        <label class="checklist-item" data-correct="false"><input type="checkbox"> <span>Нехватка рабочих</span></label>
                    </div>

                    <button class="check-answers-btn" id="verifyAnswersBtn" onclick="evaluateChecklist()">Проверить ответы</button>
                `;
                appendMessage('teacher', exerciseContent);
                currentState = 5;
            }, 2000);
        }
    }

    // Проверка чек-листа с зелено-красной подсветкой каждого пункта
    function evaluateChecklist() {
        const container = document.getElementById('tasksChecklist');
        const items = container.querySelectorAll('.checklist-item');
        let isPerfect = true;

        items.forEach(item => {
            const checkbox = item.querySelector('input[type="checkbox"]');
            const shouldBeChecked = item.getAttribute('data-correct') === 'true';
            
            // Фиксируем элементы (отключаем возможность изменять выбор)
            checkbox.setAttribute('disabled', 'true');
            item.style.pointerEvents = 'none';

            if (checkbox.checked === shouldBeChecked) {
                // Если пользователь правильно отметил нужный пункт или правильно пропустил ненужный
                if (checkbox.checked) {
                    item.classList.add('correct-cb'); // Отметил то, что нужно
                }
            } else {
                // Ошибка: либо отметил лишнее, либо пропустил важное
                item.classList.add('wrong-cb');
                isPerfect = false;
            }
        });

        const actionBtn = document.getElementById('verifyAnswersBtn');

        if (isPerfect) {
            actionBtn.innerText = "Успешно пройдено!";
            actionBtn.style.background = "#2b8a3e";
            actionBtn.setAttribute('disabled', 'true');

            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<strong>Прекрасный результат!</strong> Вы абсолютно точно определили, какие проблемы нейросеть учла в итоговом документе («Колонна не входит в проём», «Кабель-каналы не заложили», «Необходимость штробить»). Вы отлично справились со всеми уроками этого модуля! 🎉`);
            }, 1500);
        } else {
            // Если допущены неточности
            actionBtn.innerText = "Проверено с ошибками";
            actionBtn.style.background = "#c92a2a";
            actionBtn.setAttribute('disabled', 'true');

            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `Не совсем идеально. В поручение от ИИ попали три проблемы: <strong>колонна вне проёма</strong>, <strong>отсутствие кабель-каналов</strong> и <strong>необходимость штробить</strong>. Проблема с «арматурой в упор», хоть и была в аудио, осталась ИИ не замечена — это классический пример того, почему результат работы нейросети всегда нужно тщательно перепроверять человеку.`);
            }, 1500);
        }
    }

    sendBtn.addEventListener('click', () => {
        if (!sendBtn.hasAttribute('disabled')) {
            runDialogueStep();
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        runDialogueStep();
    });
</script>

</body>
</html>
