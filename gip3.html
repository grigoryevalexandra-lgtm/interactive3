<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный чат-обучение для ГИП: Анализ договоров</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff3eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Times New Roman, Arial, sans-serif;
            color: #1a1a1a;
            display: block;
            min-height: 100vh;
            padding: 20px;
        }

        /* Оптимальная ширина чата для iframe-вставок */
        .chat-container {
            max-width: 760px;
            width: 100%;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            height: 85vh;
            min-height: 600px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Шапка чата */
        .chat-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #f0e6df;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #111;
        }

        .chat-header-info p {
            font-size: 13px;
            color: #757575;
        }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafaf9;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #e0d5ce;
            border-radius: 4px;
        }

        /* Элементы сообщений */
        .message-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: messageAppear 0.4s ease-out forwards;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.teacher {
            align-self: flex-start;
        }

        .message-row.student {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 85%;
        }

        /* Контейнер для аватара-заглушки в стиле WhatsApp */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Базовая стилизация баблов сообщений */
        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .teacher .message-bubble {
            background: #ffffff;
            color: #1a1a1a;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        .student .message-bubble {
            background: #2b7de9;
            color: #ffffff;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.2);
        }

        .message-bubble p {
            margin-bottom: 8px;
        }
        .message-bubble p:last-child {
            margin-bottom: 0;
        }
        .message-bubble ul, .message-bubble ol {
            margin-left: 18px;
            margin-bottom: 10px;
        }
        .message-bubble ul:last-child, .message-bubble ol:last-child {
            margin-bottom: 0;
        }
        .message-bubble li {
            margin-bottom: 6px;
        }

        /* Окошко-симулятор проверки договора */
        .contract-checker-box {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 14px;
            margin-top: 10px;
            width: 100%;
        }

        .checker-title {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checker-textarea {
            width: 100%;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            color: #334155;
            line-height: 1.4;
            font-family: inherit;
            resize: none;
            margin-bottom: 10px;
        }

        .checker-btn {
            background: #2b7de9;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .checker-btn:hover {
            background: #1e6cd2;
        }

        .checker-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .checker-result {
            margin-top: 12px;
            padding: 12px;
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            border-radius: 4px;
            font-size: 14px;
            color: #0369a1;
            line-height: 1.5;
            display: none;
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        /* Тест / Квиз */
        .quiz-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .quiz-btn {
            background: #f1f3f5;
            border: 1px solid #e9ecef;
            padding: 14px;
            border-radius: 10px;
            text-align: left;
            font-size: 14px;
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
            font-family: inherit;
        }

        .quiz-btn:hover:not(:disabled) {
            background: #e8ecef;
            border-color: #ced4da;
        }

        .quiz-btn strong {
            display: block;
            margin-bottom: 4px;
            color: #111;
        }

        .quiz-btn.correct {
            background: #d3f9d8 !important;
            border-color: #b2f2bb !important;
            color: #2b8a3e !important;
        }

        .quiz-btn.correct strong { color: #2b8a3e !important; }

        .quiz-btn.wrong {
            background: #ffe3e3 !important;
            border-color: #ffa8a8 !important;
            color: #c92a2a !important;
        }
        
        .quiz-btn.wrong strong { color: #c92a2a !important; }

        /* Нижняя панель ввода */
        .chat-input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #f0e6df;
            position: relative;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
        }

        .chat-input-wrapper.active-input {
            background: #ffffff;
            border-color: #2b7de9;
            box-shadow: 0 0 0 3px rgba(43, 125, 233, 0.15);
        }

        .fake-input {
            flex: 1;
            font-size: 15px;
            color: #a0aec0;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .fake-input.filled {
            color: #1a202c;
        }

        .send-button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #cbd5e1;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: not-allowed;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-button.active {
            background: #2b7de9;
            cursor: pointer;
        }

        .send-button.pulse {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(43, 125, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(43, 125, 233, 0); }
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            fill: white;
            transform: translateX(1px);
        }

        .tooltip-hint {
            position: absolute;
            top: -38px;
            right: 26px;
            background: #334155;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: none;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tooltip-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-hint::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 16px;
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #334155 transparent;
        }

        /* Анимация печатания */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            align-items: center;
            justify-content: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #a0aec0;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar" id="headerAvatar"></div>
            <div class="chat-header-info">
                <h3>Главный инженер ИИваныч</h3>
                <p>В сети</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <div class="tooltip-hint" id="tooltipHint">Нажмите отправить, чтобы продолжить дальше</div>
            <div class="chat-input-wrapper" id="inputWrapper">
                <div class="fake-input" id="inputField">Напишите сообщение...</div>
                <button class="send-button" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

<script>
    const defaultAvatarSVG = `
        <svg viewBox="0 0 100 100" width="40" height="40">
            <circle cx="50" cy="50" r="50" fill="#2b7de9"/>
            <path d="M50,18c8.8,0,16,7.2,16,16c0,8.8-7.2,16-16,16c-8.8,0-16-7.2-16-16C34,25.2,41.2,18,50,18z M72.8,70.5
            C71.3,66,68.7,62.1,65.1,59C60.7,55.3,55.3,53.5,50,53.5s-10.7,1.8-15.1,5.5c-3.6,3.1-6.2,7-7.7,11.5
            c-1.3,4.1-1.2,8.6,0.3,12.7c1.3,3.5,3.9,6.3,7.2,8c3.2,1.6,6.9,2.4,10.6,2.4H50c3.7,0,7.4-0.8,10.6-2.4
            c3.3-1.7,5.9-4.5,7.2-8C73.9,79.1,74,74.6,72.8,70.5z" fill="white"/>
        </svg>
    `;

    document.getElementById('headerAvatar').innerHTML = defaultAvatarSVG;

    const chatMessages = document.getElementById('chatMessages');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const tooltipHint = document.getElementById('tooltipHint');

    let currentState = 0;

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-row teacher';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble" style="padding: 10px 14px;">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        chatMessages.appendChild(indicator);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function appendMessage(sender, contentHTML) {
        const msgRow = document.createElement('div');
        msgRow.className = `message-row ${sender}`;
        
        msgRow.innerHTML = `
            <div class="avatar">${defaultAvatarSVG}</div>
            <div class="message-bubble">${contentHTML}</div>
        `;
        
        chatMessages.appendChild(msgRow);
        scrollToBottom();
    }

    function prepareNextStudentAction(text) {
        inputField.innerText = text;
        inputField.classList.add('filled');
        inputWrapper.classList.add('active-input');
        sendBtn.removeAttribute('disabled');
        sendBtn.classList.add('active', 'pulse');
        tooltipHint.classList.add('show');
    }

    function resetInputArea() {
        inputField.innerText = "Напишите сообщение...";
        inputField.classList.remove('filled');
        inputWrapper.classList.remove('active-input');
        sendBtn.setAttribute('disabled', 'true');
        sendBtn.classList.remove('active', 'pulse');
        tooltipHint.classList.remove('show');
    }

    // Пошаговый сценарий диалога
    function runDialogueStep() {
        if (currentState === 0) {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p>Правки в договорах съедают недели. ИИ не заменит юриста, но на 80% ускорит проверку типовых пунктов, найдет риски и предложит формулировки. Ваша задача - не бояться, а контролировать.</p>`);
                
                currentState = 1;
                setTimeout(() => {
                    prepareNextStudentAction("Что важно проверить в первую очередь?");
                }, 800);
            }, 1500);
        } 
        else if (currentState === 1) {
            resetInputArea();
            appendMessage('student', 'Что важно проверить в первую очередь?');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const checklistContent = `
                    <p>Обязательно обратите внимание на:</p>
                    <ul>
                        <li><strong>Штрафные санкции.</strong> Односторонние удержания, несоразмерные неустойки</li>
                        <li><strong>Сроки.</strong> Размытые формулировки «в разумный срок», отсутствие механизма продления</li>
                        <li><strong>Порядок приемки.</strong> Право заказчика отказать без мотивировки, отсутствие сроков согласования</li>
                        <li><strong>Форс-мажоры.</strong> Узкий перечень обстоятельств, исключающих ответственность</li>
                    </ul>
                `;
                appendMessage('teacher', checklistContent);
                
                currentState = 2;
                setTimeout(() => {
                    prepareNextStudentAction("А как использовать ИИ для проверки?");
                }, 1500);
            }, 2000);
        }
        else if (currentState === 2) {
            resetInputArea();
            appendMessage('student', 'А как использовать ИИ для проверки?');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const useAIContent = `
                    <p>Как использовать ИИ:</p>
                    <ol>
                        <li>Загрузите пункт договора и попросите выделить риски</li>
                        <li>Запросите нейтральную формулировку</li>
                        <li>Сформируйте чек-лист для юриста</li>
                    </ol>
                `;
                appendMessage('teacher', useAIContent);
                
                currentState = 3;
                setTimeout(() => {
                    prepareNextStudentAction("Можно ли сразу после проверки ИИ отправлять договор?");
                }, 1500);
            }, 1800);
        }
        else if (currentState === 3) {
            resetInputArea();
            appendMessage('student', 'Можно ли сразу после проверки ИИ отправлять договор?');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                appendMessage('teacher', `<p>Нет, ИИ не заменяет юриста. Все правки согласовывайте с профильным специалистом перед отправкой.</p>`);
                
                currentState = 4;
                setTimeout(() => {
                    prepareNextStudentAction("Давайте проверим как это будет выглядеть на практике.");
                }, 1500);
            }, 1500);
        }
        else if (currentState === 4) {
            resetInputArea();
            appendMessage('student', 'Давайте проверим как это будет выглядеть на практике.');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const checkerContent = `
                    <p>Вставьте в окошко для проверки этот пункт из договора.</p>
                    <div class="contract-checker-box">
                        <div class="checker-title">🔍 Модуль ИИ-анализа текста</div>
                        <textarea class="checker-textarea" rows="4" readonly>8.3. При нарушении сроков Генподрядчик уплачивает пени 0,3% от стоимости этапа за каждый день просрочки. Если просрочка менее 30 дней, заказчик может расторгнуть договор в одностороннем порядке и потребовать возврат аванса за 5 рабочих дней.</textarea>
                        <button class="checker-btn" id="runCheckBtn" onclick="triggerContractCheck()">Проверить пункт договора</button>
                        <div class="checker-result" id="checkerResult">
                            <strong>Риски в пункте договора:</strong><br>
                            • Неустойка 0,3% в день - это 109% годовых, очень высокая. Снизить до 0,1%.<br><br>
                            • Возврат аванса за 5 дней – риск того, что деньги не успеют дойти. Увеличить до 15 дней.
                        </div>
                    </div>
                `;
                appendMessage('teacher', checkerContent);
                currentState = 5;
            }, 1800);
        }
        else if (currentState === 6) {
            resetInputArea();
            appendMessage('student', 'Отлично, подсвечиваются сразу все спорные моменты. Давай закрепим материал');
            
            setTimeout(() => { showTypingIndicator(); }, 800);

            setTimeout(() => {
                removeTypingIndicator();
                
                const quizContent = `
                    <p>Вы загрузили в нейросеть очередной пункт договора подряда. Нейросеть снова предложила три варианта анализа. Один из них точен, а два других содержат галлюцинации или упускают важные детали. Найдите правильный.</p>
                    
                    <p style="margin: 12px 0; font-size: 14px; background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-style: italic; color: #475569;">
                        <strong>7.5.</strong> Генподрядчик обязан устранять недостатки, выявленные при приемке работ, в течение 3 рабочих дней с момента получения уведомления. При нарушении этого срока Заказчик вправе привлечь третьих лиц для исправления недостатков за счет Генподрядчика без дополнительного согласования и удержать понесенные расходы из любых сумм, причитающихся Генподрядчику.
                    </p>

                    <div class="quiz-container">
                        <button class="quiz-btn" id="qBtn1" onclick="checkQuizAnswer(1)">
                            <strong>Ответ № 1</strong>
                            Срок устранения недостатков в 3 рабочих дня - крайне сжатый, предлагаю увеличить до 7. Заказчик может привлечь третьих лиц без согласия - это риск неконтролируемых расходов, следует ограничить право согласованием сметы. Удержание из любых сумм - опасно, может привести к кассовому разрыву. Кроме того, не указан порядок уведомления Генподрядчика - нужно добавить пункт о направлении уведомления заказным письмом.
                        </button>
                        
                        <button class="quiz-btn" id="qBtn2" onclick="checkQuizAnswer(2)">
                            <strong>Ответ № 2</strong>
                            Срок 3 дня - короткий, особенно для сложных дефектов, предложить градацию сроков в зависимости от вида недостатков. Привлечение третьих лиц без согласования несет высокий риск завышения стоимости, рекомендую включить механизм предварительного согласования сметы с Генподрядчиком. Удержание из любых сумм критично, предлагаю ограничить удержание суммами гарантийного депозита.
                        </button>
                        
                        <button class="quiz-btn" id="qBtn3" onclick="checkQuizAnswer(3)">
                            <strong>Ответ № 3</strong>
                            Срок 3 дня сильно сжатый, но в рамках рыночной практики, тем не менее рекомендую увеличить до 5 дней. Привлечение третьих лиц без согласования - это существенный риск, необходимо добавить право Генподрядчика предварительно согласовать кандидатуру и стоимость. Удержание из любых сумм - очень широкое полномочие, предлагаю заменить на удержание из сумм, причитающихся за данный этап работ. Пункт не содержит условий о передаче давальческих материалов Генподрядчику - это серьезный пробел, рекомендуется дополнить договор соответствующим разделом.
                        </button>
                    </div>
                `;
                appendMessage('teacher', quizContent);
                currentState = 7;
            }, 1500);
        }
    }

    // Действие при клике на "Проверить" в окошке договора
    function triggerContractCheck() {
        const resultBox = document.getElementById('checkerResult');
        const checkBtn = document.getElementById('runCheckBtn');
        
        checkBtn.setAttribute('disabled', 'true');
        checkBtn.innerText = "Анализ завершен";
        resultBox.style.display = "block";
        scrollToBottom();

        // Открываем шаг квиза
        currentState = 6;
        setTimeout(() => {
            prepareNextStudentAction("Отлично, подсвечиваются сразу все спорные моменты. Давай закрепим материал");
        }, 1500);
    }

    // Логика ответов теста
    function checkQuizAnswer(selectedOption) {
        // Блокируем кнопки после выбора
        document.getElementById('qBtn1').setAttribute('disabled', 'true');
        document.getElementById('qBtn2').setAttribute('disabled', 'true');
        document.getElementById('qBtn3').setAttribute('disabled', 'true');

        const btn1 = document.getElementById('qBtn1');
        const btn2 = document.getElementById('qBtn2');
        const btn3 = document.getElementById('qBtn3');

        if (selectedOption === 2) {
            btn2.classList.add('correct');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const successText = `
                    <p><strong>Верно!</strong> Вы выбрали точный и полный анализ без галлюцинаций.</p>
                    <ul>
                        <li>Все три риска выявлены корректно на основе текста пункта.</li>
                        <li>Предложены реальные меры - градация сроков, согласование сметы, ограничение удержаний гарантийным депозитом.</li>
                        <li>Нет требований, отсутствующих в исходном тексте.</li>
                    </ul>
                `;
                appendMessage('teacher', successText);
            }, 1500);
        } 
        else if (selectedOption === 1) {
            btn1.classList.add('wrong');
            btn2.classList.add('correct'); // Подсветим верный для наглядности
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const failText1 = `
                    <p><strong>Неверно.</strong> Этот ответ содержит ошибки или галлюцинации.</p>
                    <ul>
                        <li>Добавлено требование «уведомление заказным письмом» - в исходном пункте нет ничего о способе уведомления, это галлюцинация.</li>
                        <li>Кроме того, анализ упускает возможность градации сроков в зависимости от сложности недостатков.</li>
                    </ul>
                `;
                appendMessage('teacher', failText1);
            }, 1500);
        } 
        else if (selectedOption === 3) {
            btn3.classList.add('wrong');
            btn2.classList.add('correct');
            
            setTimeout(() => { showTypingIndicator(); }, 600);
            setTimeout(() => {
                removeTypingIndicator();
                
                const failText3 = `
                    <p><strong>Неверно.</strong> Последний пункт про давальческие материалы — это чистая галлюцинация ИИ, в исходном тексте этого близко нет.</p>
                    <p>Остальные риски описаны приемлемо, но наличие выдуманного пункта делает весь ответ ненадёжным.</p>
                `;
                appendMessage('teacher', failText3);
            }, 1500);
        }
    }

    sendBtn.addEventListener('click', () => {
        if (!sendBtn.hasAttribute('disabled')) {
            runDialogueStep();
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        runDialogueStep();
    });
</script>
